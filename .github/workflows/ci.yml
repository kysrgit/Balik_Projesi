# Balık Projesi CI Testleri Yapılandırması
# Bu iş akışı, her push ve pull request işleminde projenin testlerini otomatik olarak koşturur.

name: Balik Projesi CI Testleri

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Kodu Çek (Checkout)
      uses: actions/checkout@v4

    - name: Python 3.10 Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Sistem Gereksinimlerini Yükle (SpatiaLite & OpenCV için)
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-mod-spatialite libgl1

    - name: Bağımlılıkları Yükle (requirements.txt)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: 64 Testi Çalıştır (Pytest)
      run: |
        pytest tests/ -v
